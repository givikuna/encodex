name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        
        # --- PROFESSIONAL ISSUE MESSAGE ---
        issue-message: |
          Thank you for opening your first issue in the encodex repository. 

          As this project is currently undergoing a modular rework, please ensure that your report includes sufficient technical context and reproduction steps where applicable. 

          **Recommendations:**
          * Review existing [Discussions](https://github.com/givikuna/encodex/discussions) to see if this topic is already under consideration.
          * Consult the [README.md](https://github.com/givikuna/encodex/blob/main/README.md) for the current module roadmap.
          * Provide environment details if you are reporting a bug in the existing beta modules.

        # --- PROFESSIONAL PR MESSAGE ---
        pr-message: |
          Thank you for your first pull request to encodex. 

          To ensure a smooth review process, please verify that your submission adheres to our core development standards:
          
          * **Strict Typing:** Ensure no 'any' types are used.
          * **Documentation:** All functions and classes must include TSDoc/JSDoc comments.
          * **Declarations:** If you are using a non-TypeScript language (LiveScript, JavaScript, PureScript etc.), ensure the mandatory .d.ts file is included.
          
          We recommend reviewing the [CONTRIBUTING.md](https://github.com/givikuna/encodex/blob/main/CONTRIBUTING.md) file one last time to ensure compliance with our modular architecture. A maintainer will review your changes shortly.
